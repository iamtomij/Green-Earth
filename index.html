<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Green Earth</title>
      <link rel="shortcut icon" href="./assets/favicon.jpeg"
         type="image/x-icon">
      <!-- tailwind+daisyui  -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <link rel="stylesheet" href="./style.css">
      <!-- google font -->
      <link
         href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
         rel="stylesheet">
      <!-- font awesome CDN -->
      <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
         crossorigin="anonymous" referrerpolicy="no-referrer" />
   </head>
   <body>
      <main class="container mx-auto ">
         <h2
            class=" text-center font-semibold text-[32px] text-[#1F2937]">Choose
            Your
            Trees</h2>
         <div
            class="grid grid-cols-1 sm:grid-cols-3 md:grid-cols-2 lg:grid-cols-12 gap-6 lg:gap-8 items-start">

            <div class="bg-white card card-body shadow-2xl col-span-3 lg:sticky top-4 self-start"> 
               <h3 class="text-[20px] font-semibold">Categories</h3>
               <div class="space-y-2 sticky top-4 pt-4">
                  <button id="allTreesbtn"
                     class="btn bg-primaryColor w-full rounded-md text-white">All
                     Trees</button>

                  <div id="categoryContainer" class="space-y-2">

                  </div>

               </div>
            </div>
            <div class="col-span-6">
               <div id="treesContainer"
                  class="grid grid-cols-1 sm:grid-cols-3 gap-6">

                  <!-- dynamically added here -->

                  <!-- Loading spinner -->
                  <div id="loadingSpinner"
                     class="h-[60vh] hidden justify-center items-center">
                     <span
                        class="loading loading-infinity loading-lg hidden"></span>
                  </div>

               </div>
            </div>

            <div
               class="bg-white card card-body shadow-2xl lg:col-span-3 lg:sticky top-4 self-start">
               <h2 class="text-[20px] font-semibold">Your Cart</h2>
               <div class="space-y-4">
                  <div id="cartContainer" class="space-y-4">
                     <!-- <div class=" bg-[#F0FDF4] rounded-xl cart card-body">
                        <div class="flex justify-between items-center">
                           <div class>
                              <h2 class="font-semibold text-[#1F2937]">Name</h2>
                              <p>৳2000 x 10</p>
                           </div>
                           <button class="btn btn-ghost tex">X</button>
                        </div>
                        <p class=" font-semibold text-xl ">৳500</p>
                     </div> -->
                  </div>

                  <div id="emptyCartMessage" class="text-center py-4">
                     <p>Your cart is empty.</p>
                     <p>Add trees to get started.</p>
                     <img src="./assets/AddToCart.jpg" alt="addToCart"
                        class="mx-auto h-[50px]">
                  </div>

                  <hr class="bg-[#1F2937]/10">

                  <!-- total amount -->
                  <div
                     class="flex justify-between items-center text-white bg-primaryColor rounded p-4 my-3">
                     <span class="font-normal text-[16px]">Total</span>
                     <span class="totalPrice">৳0</span>
                  </div>

               </div>
            </div>
         </div>

         <!-- product details modal -->
         <dialog id="treeModal" class="modal">
            <div class="modal-box">
               <div class="flex justify-between items-start mb-4">
                  <h3 class="font-bold text-2xl text-green-700"
                     id="modalTitle">Tree Details</h3>
                  <button class="btn btn-sm btn-circle btn-ghost"
                     onclick="document.getElementById('treeModal').close()">✕</button>
               </div>

               <!-- Modal Content -->
               <div class=" gap-6">
                  <!-- Plant Image -->
                  <img id="modalImage" src alt="plant"
                     class="w-full !h-[250px] object-cover rounded-lg mb-12">

                  <!-- Plant Details -->
                  <div class>
                     <p class="text-sm text-gray-500 mb-2">
                        <span class="font-bold">Category:</span>
                        <span id="modalCategory"
                           class="badge badge-primary"></span>
                     </p>
                     <p class="text-sm text-gray-600 mb-4">
                        <span id="modalDescription"></span>
                     </p>
                     <div class="flex items-baseline gap-2 mb-6">
                        <span class="text-3xl font-bold text-green-600">৳<span
                              id="modalPrice">0</span></span>
                     </div>
                  </div>
               </div>
               <div class="modal-action">
                  <form method="dialog">
                     <button class="btn">Close</button>
                  </form>
               </div>
            </div>
         </dialog>

      </main>
      <script src="./JS/script.js"></script>
   </body>
</html>
