<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Green Earth</title>
      <link rel="shortcut icon" href="./assets/favicon.jpeg"
         type="image/x-icon">
      <!-- tailwind+daisyui  -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <link rel="stylesheet" href="./style.css">
      <!-- google font -->
      <link
         href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
         rel="stylesheet">
      <!-- font awesome CDN -->
      <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
         crossorigin="anonymous" referrerpolicy="no-referrer" />
   </head>
   <body>
      <main class="container mx-auto ">
         <h2 class=" text-center font-semibold text-[32px] text-[#1F2937]">Choose Your
            Trees</h2>
         <div class="grid grid-cols-12 gap-8">

            <div class="bg-white card card-body shadow-2xl col-span-3">
               <h3 class="text-[20px] font-semibold">Categories</h3>
               <div class="space-y-2">
                  <button id="allTreesbtn"
                     class="btn bg-primaryColor w-full rounded-md text-white">All
                     Trees</button>

                  <div id="categoryContainer" class="space-y-2">

                  </div>

               </div>
            </div>
            <div class="col-span-6">
               <div id="treesContainer"
                  class="grid grid-cols-1 sm:grid-cols-3 gap-6">

                  <!-- dynamically added here -->


               </div>
            </div>
            <div class="bg-white card card-body shadow-2xl col-span-3">
               Cart
            </div>
         </div>

      </main>
      <script src="./JS/script.js"></script>
   </body>
</html>
